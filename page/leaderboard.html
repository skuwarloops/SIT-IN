<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCS | Leaderboard</title>
  <link rel="stylesheet" href="/css/landing.css"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <link rel="stylesheet" href="/css/darkmode.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    .leaderboard-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .leaderboard-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .leaderboard-header h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .leaderboard-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .leaderboard-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-card .label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .leaderboard-table-wrapper {
      background: var(--bg-secondary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 40px;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
    }

    .leaderboard-table thead {
      background: var(--bg-tertiary);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .leaderboard-table th {
      padding: 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }

    .leaderboard-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s;
    }

    .leaderboard-table tbody tr:hover {
      background: rgba(255,255,255,0.03);
    }

    .leaderboard-table tbody tr.current-user {
      background: rgba(99,102,241,0.1);
    }

    .leaderboard-table td {
      padding: 16px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-weight: 700;
      font-size: 14px;
      margin-right: 12px;
    }

    .rank-badge.top-1 {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #1f2937;
    }

    .rank-badge.top-2 {
      background: linear-gradient(135deg, #c7d2fe, #a5b4fc);
      color: #1f2937;
    }

    .rank-badge.top-3 {
      background: linear-gradient(135deg, #fca5a5, #f87171);
      color: #fff;
    }

    .rank-badge.other {
      background: rgba(255,255,255,0.1);
      color: var(--text-secondary);
    }

    .student-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .student-name {
      font-weight: 600;
      color: var(--text-primary);
    }

    .student-id {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .points-cell {
      text-align: right;
      font-weight: 700;
      color: #818cf8;
    }

    .metric-cell {
      text-align: center;
      color: var(--text-secondary);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .error-message {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .leaderboard-table {
        font-size: 12px;
      }

      .leaderboard-table th,
      .leaderboard-table td {
        padding: 12px 8px;
      }

      .rank-badge {
        width: 28px;
        height: 28px;
        font-size: 12px;
      }

      .student-name {
        font-size: 13px;
      }

      .student-id {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-logo">
      <img src="/images/ccsmainlogo.png" alt="CCS Logo"/>
    </div>
    <div class="nav-menu">
      <a href="/page/landingpage.html" class="nav-item">Home</a>
      <a href="/page/dashboard.html" class="nav-item">Dashboard</a>
      <a href="/page/leaderboard.html" class="nav-item active">Leaderboard</a>
      <a href="/page/lab-availability.html" class="nav-item">Lab Availability</a>
      <a href="/page/reservation.html" class="nav-item">Reservations</a>
      <a href="/page/community.html" class="nav-item">Community</a>
      <a href="/login-register/index.html?action=logout" class="nav-item logout">Logout</a>
    </div>
    <div class="nav-toggle" id="navToggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <div class="leaderboard-container">
    <div class="leaderboard-header">
      <h1>🏆 Leaderboard</h1>
      <p>See who's spending the most time in our labs!</p>
    </div>

    <div id="userStatsContainer" class="leaderboard-stats"></div>

    <div id="leaderboardContent">
      <div class="loading">Loading leaderboard...</div>
    </div>
  </div>

  <script>
    const LABS = ['Lab 524', 'Lab 526', 'Lab 528', 'Lab 530', 'Lab 540'];

    async function loadLeaderboard() {
      try {
        const response = await fetch('/api/leaderboard');
        if (!response.ok) throw new Error('Failed to load leaderboard');
        const data = await response.json();
        
        displayLeaderboard(data);
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('leaderboardContent').innerHTML = 
          `<div class="error-message">Failed to load leaderboard. Please try again.</div>`;
      }
    }

    function displayLeaderboard(leaderboard) {
      const container = document.getElementById('leaderboardContent');
      
      if (!leaderboard || leaderboard.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📊</div>
            <p>No data yet. Start your sit-in sessions to appear on the leaderboard!</p>
          </div>
        `;
        return;
      }

      let tableHTML = `
        <div class="leaderboard-table-wrapper">
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Student</th>
                <th>Points</th>
                <th>Sessions</th>
                <th>Total Hours</th>
              </tr>
            </thead>
            <tbody>
      `;

      leaderboard.forEach(student => {
        const hours = Math.floor(student.total_minutes / 60);
        const minutes = student.total_minutes % 60;
        const timeStr = `${hours}h ${minutes}m`;
        
        let rankClass = 'other';
        if (student.rank === 1) rankClass = 'top-1';
        else if (student.rank === 2) rankClass = 'top-2';
        else if (student.rank === 3) rankClass = 'top-3';

        tableHTML += `
          <tr>
            <td>
              <span class="rank-badge ${rankClass}">${student.rank}</span>
            </td>
            <td>
              <div class="student-info">
                <span class="student-name">${escapeHtml(student.fullname)}</span>
                <span class="student-id">${student.id_number}</span>
              </div>
            </td>
            <td class="points-cell">${student.total_points}</td>
            <td class="metric-cell">${student.sitin_count}</td>
            <td class="metric-cell">${timeStr}</td>
          </tr>
        `;
      });

      tableHTML += `
            </tbody>
          </table>
        </div>
      `;

      container.innerHTML = tableHTML;
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Load on page load
    document.addEventListener('DOMContentLoaded', loadLeaderboard);

    // Setup mobile nav toggle
    const navToggle = document.getElementById('navToggle');
    const navMenu = document.querySelector('.nav-menu');
    if (navToggle && navMenu) {
      navToggle.addEventListener('click', () => {
        navMenu.classList.toggle('active');
      });
    }
  </script>
</body>
</html>
