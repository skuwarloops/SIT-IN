<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCS Admin | Testimonials</title>
  <link rel="stylesheet" href="../css/admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── Filter tabs ── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: 6px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--card-border, #1a3558);
      background: transparent;
      color: var(--muted, #5a7a9a);
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .filter-tab:hover {
      border-color: var(--gold, #c9a227);
      color: var(--gold, #c9a227);
    }
    .filter-tab.active {
      background: var(--gold, #c9a227);
      border-color: var(--gold, #c9a227);
      color: #07101e;
    }

    /* ── Summary counts ── */
    .testi-summary {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .testi-count-badge {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      color: var(--muted, #5a7a9a);
      border: 1px solid var(--card-border, #1a3558);
    }
    .testi-count-badge span { color: var(--gold, #c9a227); font-weight: 700; }

    /* ── Grid ── */
    .testi-admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .testi-admin-card {
      background: var(--card-bg, #111827);
      border: 1px solid var(--card-border, #1a3558);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .testi-admin-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }
    .testi-admin-card.pending  { border-left: 4px solid #f59e0b; }
    .testi-admin-card.approved { border-left: 4px solid #22c55e; }

    .tac-stars {
      font-size: 16px;
      color: #f59e0b;
      letter-spacing: 1px;
    }
    .tac-msg {
      font-size: 13px;
      color: var(--muted, #5a7a9a);
      line-height: 1.65;
      font-style: italic;
    }
    .tac-author {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }
    .tac-course {
      font-size: 11px;
      color: var(--muted, #5a7a9a);
    }
    .tac-date {
      font-size: 11px;
      color: var(--muted, #5a7a9a);
    }
    .tac-status {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      width: fit-content;
    }
    .tac-status.pending  { background: rgba(251,191,36,0.12); color: #fbbf24; }
    .tac-status.approved { background: rgba(34,197,94,0.12);  color: #4ade80; }

    .tac-actions { display: flex; gap: 8px; margin-top: 4px; }

    .btn-approve {
      padding: 5px 14px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #4ade80;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-approve:hover { background: rgba(34,197,94,0.2); }

    .testi-empty {
      color: var(--muted, #5a7a9a);
      font-size: 14px;
      text-align: center;
      padding: 60px 0;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

  <nav class="admin-navbar">
    <div class="admin-nav-brand">
      <img src="../images/uclogo.png" alt="UC"/>
      <img src="../images/ccsmainlogo.png" alt="CCS"/>
      CCS · Admin
    </div>
    <ul class="admin-nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="search.html">Search</a></li>
      <li><a href="students.html">Students</a></li>
      <li><a href="sitin.html">Sit-in</a></li>
      <li><a href="sitin-records.html">Sit-in Records</a></li>
      <li><a href="feedback.html">Feedback</a></li>
      <li><a href="software.html">Software</a></li>
      <li><a href="lab-availability.html">Lab Availability</a></li>
      <li><a href="reservations.html">Reservations</a></li>
      <li><a href="analytics.html">Analytics</a></li>
      <li><a href="testimonials.html" class="active">Testimonials</a></li>
    </ul>
    <button class="admin-logout-btn" onclick="adminLogout()">Log out</button>
  </nav>

  <div class="admin-main">
    <div class="admin-page-title">Student Testimonials</div>

    <!-- Summary -->
    <div class="testi-summary">
      <div class="testi-count-badge">Total: <span id="count-all">—</span></div>
      <div class="testi-count-badge">Pending: <span id="count-pending">—</span></div>
      <div class="testi-count-badge">Approved: <span id="count-approved">—</span></div>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterTestimonials('all', this)">All</button>
      <button class="filter-tab" onclick="filterTestimonials('pending', this)">⏳ Pending</button>
      <button class="filter-tab" onclick="filterTestimonials('approved', this)">✅ Approved</button>
    </div>

    <!-- Panel wrapping the grid -->
    <div class="admin-panel">
      <div class="admin-panel-header">
        <h3>🗣️ Testimonials</h3>
      </div>
      <div class="admin-panel-body">
        <div id="testi-grid" class="testi-admin-grid">
          <div class="testi-empty">Loading testimonials...</div>
        </div>
      </div>
    </div>

  </div>

  <script src="../js/admin.js"></script>
  <script>
    requireAdmin();
    setActiveNav();

    let allTestimonials = [];
    let currentFilter   = 'all';

    function formatDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    async function loadTestimonials() {
      try {
        const res = await fetch(API + '/admin/testimonials', { credentials: 'include' });
        allTestimonials = await res.json();
        updateCounts();
        renderGrid();
      } catch {
        document.getElementById('testi-grid').innerHTML =
          '<div class="testi-empty">Could not load testimonials.</div>';
      }
    }

    function updateCounts() {
      document.getElementById('count-all').textContent      = allTestimonials.length;
      document.getElementById('count-pending').textContent  = allTestimonials.filter(t => !t.is_approved).length;
      document.getElementById('count-approved').textContent = allTestimonials.filter(t =>  t.is_approved).length;
    }

    function renderGrid() {
      const grid = document.getElementById('testi-grid');
      let list = allTestimonials;

      if (currentFilter === 'pending')  list = list.filter(t => !t.is_approved);
      if (currentFilter === 'approved') list = list.filter(t =>  t.is_approved);

      if (!list.length) {
        grid.innerHTML = `<div class="testi-empty">No ${currentFilter === 'all' ? '' : currentFilter} testimonials.</div>`;
        return;
      }

      grid.innerHTML = list.map(t => `
        <div class="testi-admin-card ${t.is_approved ? 'approved' : 'pending'}" id="tac-${t.id}">
          <div class="tac-stars">${'★'.repeat(t.rating)}${'☆'.repeat(5 - t.rating)}</div>
          <div class="tac-msg">"${escHtml(t.message)}"</div>
          <div class="tac-author">${escHtml(t.fullname || '—')}</div>
          <div class="tac-course">${escHtml(t.course || '')}</div>
          <div class="tac-date">${formatDate(t.created)}</div>
          <div class="tac-status ${t.is_approved ? 'approved' : 'pending'}">
            ${t.is_approved ? '✅ Approved' : '⏳ Pending'}
          </div>
          <div class="tac-actions">
            ${!t.is_approved
              ? `<button class="btn-approve" onclick="approve(${t.id})">✅ Approve</button>`
              : ''}
            <button class="btn-danger" style="padding:5px 14px;font-size:12px;" onclick="reject(${t.id})">🗑 Delete</button>
          </div>
        </div>`).join('');
    }

    function filterTestimonials(filter, el) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderGrid();
    }

    async function approve(tid) {
      try {
        await fetch(`${API}/admin/testimonials/${tid}/approve`, { method: 'POST', credentials: 'include' });
        const t = allTestimonials.find(x => x.id === tid);
        if (t) t.is_approved = 1;
        showToast('Testimonial approved!');
        updateCounts();
        renderGrid();
      } catch { showToast('Error approving.', 'error'); }
    }

    async function reject(tid) {
      if (!confirm('Delete this testimonial?')) return;
      try {
        await fetch(`${API}/admin/testimonials/${tid}/reject`, { method: 'POST', credentials: 'include' });
        allTestimonials = allTestimonials.filter(t => t.id !== tid);
        showToast('Testimonial deleted.');
        updateCounts();
        renderGrid();
      } catch { showToast('Error deleting.', 'error'); }
    }

    function escHtml(str) {
      return String(str || '').replace(/[&<>"']/g, m =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    loadTestimonials();
  </script>
</body>
</html>
